<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWO Registration Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#5aacf5;--accent-dim:#2a6fa8;
  --bg:#0b0b0b;--bg2:#111111;--bg3:#181818;--bg4:#1f1f1f;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --text:#f0ede8;--text2:#a09c97;--text3:#5e5b58;
  --green:#3db87a;--red:#e05252;--amber:#e09a3a;--input-bg:#080808;
}
[data-theme="light"]{
  --accent:#c0222c;--accent-dim:#8a0008;
  --bg:#f5f3ef;--bg2:#eceae5;--bg3:#e3e0db;--bg4:#d8d5d0;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --text:#111110;--text2:#5a5754;--text3:#999693;--input-bg:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;transition:background .2s,color .2s;}
button,input,select{font-family:inherit;}

/* PASSWORD */
#pw-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.pw-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:2.5rem;width:100%;max-width:360px;text-align:center;}
.pw-logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:4px;color:var(--accent);margin-bottom:2px;}
.pw-sub{font-size:12px;color:var(--text3);letter-spacing:.6px;margin-bottom:2rem;}
.pw-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block;text-align:left;}
.pw-input{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;font-size:15px;color:var(--text);outline:none;margin-bottom:1rem;transition:border-color .2s;text-align:center;letter-spacing:4px;}
.pw-input:focus{border-color:var(--accent);}
.pw-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.pw-btn:hover{opacity:.88;}
.pw-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* APP */
#app{display:none;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;gap:10px;}
.topbar-l{display:flex;align-items:center;gap:14px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2.5px;color:var(--accent);line-height:1;}
.season-tag{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-family:'DM Mono',monospace;}
.topbar-r{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.save-status{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sdot.saving{background:var(--amber);animation:pulse 1s infinite;}
.sdot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.btn{padding:7px 14px;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;border:none;}
.btn-ol{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ol:hover{border-color:var(--accent);color:var(--accent);}
.btn-ac{background:var(--accent);color:#fff;font-weight:700;}
.btn-ac:hover{opacity:.88;}
.theme-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:5px 10px;cursor:pointer;font-size:14px;}

/* RACE NAV */
.race-nav{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 1.5rem;display:flex;align-items:center;gap:2px;overflow-x:auto;}
.race-tab{padding:11px 16px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.6px;text-transform:uppercase;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;}
.race-tab:hover{color:var(--text2);}
.race-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.main{max-width:1140px;margin:0 auto;padding:1.25rem 1.5rem;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;}
.stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:5px;}
.stat-num{font-size:26px;font-weight:300;color:var(--text);font-family:'DM Mono',monospace;}
.stat-num.g{color:var(--green);} .stat-num.r{color:var(--red);} .stat-num.a{color:var(--amber);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 13px;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--text3);}
.fsel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--text2);outline:none;cursor:pointer;}
.fsel option{background:var(--bg2);}

/* CLASS GROUPS */
.class-group{margin-bottom:1.5rem;}
.class-group-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;}
.class-group-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px;color:var(--accent);}
.class-group-ct{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.team-grid{display:grid;gap:8px;}

/* TEAM CARD */
.team-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;}
.team-card:hover{border-color:var(--border2);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.card-head-l{display:flex;align-items:center;gap:11px;}
.boat-badge{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);flex-shrink:0;}
.team-name-t{font-size:14px;font-weight:600;color:var(--text);}
.team-meta{font-size:11px;color:var(--text3);margin-top:1px;}
.card-head-r{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pill{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:3px 8px;border-radius:20px;}
.p-green{background:rgba(61,184,122,.12);color:var(--green);border:1px solid rgba(61,184,122,.25);}
.p-red{background:rgba(224,82,82,.12);color:var(--red);border:1px solid rgba(224,82,82,.25);}
.p-amber{background:rgba(224,154,58,.12);color:var(--amber);border:1px solid rgba(224,154,58,.25);}
.p-gray{background:rgba(128,128,128,.08);color:var(--text3);border:1px solid var(--border);}
.p-ac{background:rgba(90,172,245,.12);color:var(--accent);border:1px solid rgba(90,172,245,.25);}
[data-theme="light"] .p-ac{background:rgba(192,34,44,.1);border-color:rgba(192,34,44,.25);}
.card-body-inner{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));}
.role-col{padding:10px 14px;border-right:1px solid var(--border);}
.role-col:last-child{border-right:none;}
.role-heading{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:4px;opacity:.7;}
.person-name-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px;}
.apba-num{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:6px;}
.checklist{display:flex;flex-direction:column;gap:3px;}
.check-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cdot.ok{background:var(--green);} .cdot.no{background:var(--red);}
.crew-section{padding:8px 14px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.crew-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);width:100%;margin-bottom:2px;}
.crew-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.crew-cdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.crew-cdot.ok{background:var(--green);} .crew-cdot.no{background:var(--amber);}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.card-foot-note{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.card-actions{display:flex;gap:6px;}
.btn-sm{padding:5px 10px;font-size:11px;font-weight:600;border-radius:5px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.btn-sm-ol{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-sm-ol:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm-r{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.25);color:var(--red);}
.btn-sm-r:hover{background:rgba(224,82,82,.2);}
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text3);}
.empty-state h3{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:6px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:680px;margin:auto;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:600;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px;}
.msec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:10px;margin-top:18px;opacity:.8;}
.msec:first-child{margin-top:0;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);}
.field input,.field select{background:var(--input-bg);border:1px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;width:100%;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text3);opacity:.45;}
.field select option{background:var(--bg2);}
.doc-checks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.dchk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;}
.dchk input{accent-color:var(--accent);cursor:pointer;width:13px;height:13px;flex-shrink:0;}
.mem-paid-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.mem-paid-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mem-paid-lbl{font-size:11px;color:var(--text2);}
.mem-paid-sel{background:var(--input-bg);border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:11px;color:var(--text);outline:none;cursor:pointer;}
.mem-paid-sel option{background:var(--bg2);}
.crew-area{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:8px;}
.crew-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.crew-row:last-of-type{margin-bottom:0;}
.crew-row input[type="text"]{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);outline:none;}
.crew-row input[type="text"]:focus{border-color:var(--accent);}
.crew-row input[type="text"]::placeholder{color:var(--text3);opacity:.45;}
.crew-paysel{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:7px 8px;font-size:11px;color:var(--text);outline:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.crew-paysel option{background:var(--bg2);}
.btn-rm{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0 3px;flex-shrink:0;}
.btn-rm:hover{color:var(--red);}
.btn-addcrew{background:transparent;border:1px dashed var(--border2);border-radius:6px;padding:7px 12px;font-size:11px;color:var(--text3);cursor:pointer;width:100%;margin-top:7px;transition:all .15s;}
.btn-addcrew:hover{border-color:var(--accent);color:var(--accent);}
.race-reg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.rri{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.rri-head{padding:7px 10px;background:var(--bg3);border-bottom:1px solid var(--border);}
.rri-name{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.rri-date{font-size:10px;color:var(--text3);margin-top:1px;}
.rri-body{padding:8px 10px;}
.rri-chk{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);margin-bottom:6px;cursor:pointer;}
.rri-chk input{accent-color:var(--accent);cursor:pointer;}
.pay-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:3px;}
.pay-sel{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:5px;padding:5px 7px;font-size:11px;color:var(--text);outline:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
.pay-sel option{background:var(--bg2);}
.modal-ftr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.modal-ftr-l{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
.modal-ftr-r{display:flex;gap:8px;}
.btn-cancel{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;}
.btn-cancel:hover{border-color:var(--text2);}
.btn-save{background:var(--accent);border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s;}
.btn-save:hover{opacity:.88;}

/* PRINT MODAL */
.print-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;padding:1.5rem;}
.print-overlay.open{display:flex;}
.print-box{background:#fff;border-radius:12px;width:100%;max-width:580px;font-family:'DM Sans',sans-serif;overflow:hidden;max-height:92vh;overflow-y:auto;}
.print-bar{display:flex;gap:8px;padding:10px 14px;background:#ebebeb;border-bottom:1px solid #ddd;justify-content:flex-end;position:sticky;top:0;}
.btn-pclose{background:#555;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-pprint{background:#111;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}

/* PRINT CARD - always light */
.pc{padding:22px 26px;color:#111;background:#fff;}
.pc-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;padding-bottom:11px;border-bottom:2.5px solid #111;}
.pc-org{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#111;line-height:1;}
.pc-evtlbl{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.7px;margin-top:3px;}
.pc-boat{width:50px;height:50px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;flex-shrink:0;}
.pc-team-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
.pc-tname{font-size:17px;font-weight:700;color:#111;}
.pc-cls{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;background:#111;color:#fff;padding:3px 9px;border-radius:4px;}
.pc-mempaid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.pc-mp-cell{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:6px;padding:6px 8px;text-align:center;}
.pc-mp-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:3px;}
.pc-mp-val{font-size:11px;font-weight:700;}
.pc-mp-val.paid{color:#3db87a;} .pc-mp-val.unpaid{color:#e05252;}
.pc-crew-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.pc-role{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:7px;padding:9px 11px;}
.pc-rlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:3px;}
.pc-rname{font-size:13px;font-weight:700;color:#111;margin-bottom:1px;}
.pc-rapba{font-size:10px;color:#888;font-family:'DM Mono',monospace;margin-bottom:6px;}
.pc-checks{display:flex;flex-direction:column;gap:3px;}
.pc-chk{display:flex;align-items:center;gap:5px;font-size:10px;color:#444;}
.pc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pc-dot.ok{background:#3db87a !important;} .pc-dot.no{background:#e05252 !important;}
.pc-crew-list{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:7px;padding:8px 11px;margin-bottom:10px;}
.pc-crew-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:6px;}
.pc-crew-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #e8e8e8;}
.pc-crew-row:last-child{border-bottom:none;}
.pc-crew-name{font-weight:600;color:#111;}
.pc-crew-pay{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;}
.pc-crew-pay.paid{background:#e8f5ef;color:#2d8c5e;} .pc-crew-pay.unpaid{background:#fdeaea;color:#c0392b;}
.pc-pay{border:1px solid #e0e0e0;border-radius:7px;overflow:hidden;margin-bottom:10px;}
.pc-pay-hdr{background:#111;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:5px 11px;}
.pc-pay-grid{display:grid;grid-template-columns:repeat(4,1fr);}
.pc-pay-cell{padding:7px 8px;border-right:1px solid #e0e0e0;text-align:center;}
.pc-pay-cell:last-child{border-right:none;}
.pc-pay-race{font-size:9px;font-weight:700;color:#111;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.pc-pay-status{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;display:inline-block;}
.pc-pay-status.paid{background:#e8f5ef;color:#2d8c5e;}
.pc-pay-status.unpaid{background:#fdeaea;color:#c0392b;}
.pc-pay-status.partial{background:#fef5e7;color:#b7770d;}
.pc-pay-status.na{background:#f0f0f0;color:#999;}
.pc-verify{border:1.5px dashed #ccc;border-radius:7px;padding:8px 11px;}
.pc-verify-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;margin-bottom:6px;}
.pc-verify-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.pc-verify-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#555;}
.pc-verify-box{width:11px;height:11px;border:1.5px solid #bbb;border-radius:2px;flex-shrink:0;display:inline-block;}
.pc-ftr{margin-top:10px;padding-top:8px;border-top:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;}
.pc-ftr-note{font-size:10px;color:#aaa;}
.pc-ftr-logo{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#ccc;}

/* TOAST */
.toast{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-size:13px;color:var(--text);z-index:400;display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

@media(max-width:640px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .card-body-inner{grid-template-columns:1fr;}
  .role-col{border-right:none;border-bottom:1px solid var(--border);}
  .role-col:last-child{border-bottom:none;}
  .race-reg-grid{grid-template-columns:repeat(2,1fr);}
  .fg2{grid-template-columns:1fr;}
  .doc-checks{grid-template-columns:repeat(2,1fr);}
  .pc-crew-grid{grid-template-columns:1fr;}
  .pc-mempaid{grid-template-columns:repeat(2,1fr);}
}
@media print{
  body *{visibility:hidden;}
  .pc,.pc *{visibility:visible;}
  .pc{position:fixed;inset:0;padding:18px 22px;}
  .print-bar{display:none!important;}
}
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-card">
    <div class="pw-logo">RWO</div>
    <div class="pw-sub">Registration Manager &mdash; 2026 Season</div>
    <label class="pw-lbl">Password</label>
    <input class="pw-input" type="password" id="pw-input" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Enter</button>
    <div class="pw-err" id="pw-err">Incorrect password.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-l">
      <div class="logo">RWO</div>
      <div class="season-tag" id="season-tag">2026 Season</div>
    </div>
    <div class="topbar-r">
      <div class="save-status"><div class="sdot" id="sdot"></div><span id="slbl">Saved</span></div>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-icon">&#127769;</button>
      <button class="btn btn-ol" onclick="doLogout()">Lock</button>
      <button class="btn btn-ac" onclick="openAdd()">+ Add Team</button>
    </div>
  </div>
  <div class="race-nav" id="race-nav">
    <button class="race-tab active" data-race="all" onclick="switchRace(this)">All Races</button>
  </div>
  <div class="main">
    <div class="stats-row" id="stats-row"></div>
    <div class="toolbar">
      <input class="search-box" type="text" placeholder="Search team, boat #, driver, throttleman..." id="search-in" oninput="renderAll()">
      <select class="fsel" id="fpay" onchange="renderAll()">
        <option value="">All payment statuses</option>
        <option value="paid">Fully paid</option>
        <option value="unpaid">Unpaid</option>
        <option value="partial">Partial</option>
      </select>
      <select class="fsel" id="fdocs" onchange="renderAll()">
        <option value="">All doc statuses</option>
        <option value="missing">Missing docs</option>
        <option value="complete">Docs complete</option>
      </select>
    </div>
    <div id="teams-container"></div>
  </div>
</div>

<div class="modal-overlay" id="team-modal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title" id="mtitle">Add Team</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="msec">Team Info</div>
      <div class="fg2">
        <div class="field"><label>Team Name</label><input type="text" id="f-tn" placeholder="Thunder Marine Racing"></div>
        <div class="field"><label>Boat #</label><input type="text" id="f-bn" placeholder="47"></div>
        <div class="field"><label>Class</label>
          <select id="f-cl">
            <option value="">Select class...</option>
            <option>Super Cat</option><option>Super Stock</option><option>Class 1</option>
            <option>Factory Stock</option><option>Super Vee</option><option>Modified V</option>
            <option>Bracket Class 2</option><option>Bracket Class 3</option><option>Bracket Class 4</option>
            <option>Bracket Class 5</option><option>Bracket Class 6</option><option>Bracket Class 7</option>
            <option>Cat 300</option><option>Extreme</option>
          </select>
        </div>
        <div class="field"><label>Notes</label><input type="text" id="f-nt" placeholder="Optional"></div>
      </div>

      <div class="msec">Driver</div>
      <div class="fg2">
        <div class="field"><label>Name</label><input type="text" id="f-dn" placeholder="Jake Harmon"></div>
        <div class="field"><label>APBA #</label><input type="text" id="f-dw" placeholder="10482"></div>
      </div>
      <div class="doc-checks">
        <label class="dchk"><input type="checkbox" id="f-dr"> RWO Member</label>
        <label class="dchk"><input type="checkbox" id="f-dw2"> APBA Member</label>
        <label class="dchk"><input type="checkbox" id="f-dm"> Medical Cert</label>
        <label class="dchk"><input type="checkbox" id="f-dd"> Dunker Test</label>
      </div>
      <div class="mem-paid-row">
        <div class="mem-paid-item"><span class="mem-paid-lbl">RWO Fee &mdash; Driver</span><select class="mem-paid-sel" id="f-drwop"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
        <div class="mem-paid-item"><span class="mem-paid-lbl">APBA Fee &mdash; Driver</span><select class="mem-paid-sel" id="f-dapbap"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
      </div>

      <div class="msec">Throttleman</div>
      <div class="fg2">
        <div class="field"><label>Name</label><input type="text" id="f-tn2" placeholder="Marcus Webb"></div>
        <div class="field"><label>APBA #</label><input type="text" id="f-tw" placeholder="10841"></div>
      </div>
      <div class="doc-checks">
        <label class="dchk"><input type="checkbox" id="f-tr"> RWO Member</label>
        <label class="dchk"><input type="checkbox" id="f-tw2"> APBA Member</label>
        <label class="dchk"><input type="checkbox" id="f-tm"> Medical Cert</label>
        <label class="dchk"><input type="checkbox" id="f-td"> Dunker Test</label>
      </div>
      <div class="mem-paid-row">
        <div class="mem-paid-item"><span class="mem-paid-lbl">RWO Fee &mdash; Throttleman</span><select class="mem-paid-sel" id="f-trwop"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
        <div class="mem-paid-item"><span class="mem-paid-lbl">APBA Fee &mdash; Throttleman</span><select class="mem-paid-sel" id="f-tapbap"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
      </div>

      <div class="msec">Alternate Driver / Throttleman</div>
      <div class="fg2">
        <div class="field"><label>Name</label><input type="text" id="f-an" placeholder="Optional"></div>
        <div class="field"><label>APBA #</label><input type="text" id="f-aw" placeholder="Optional"></div>
      </div>
      <div class="doc-checks">
        <label class="dchk"><input type="checkbox" id="f-ar"> RWO Member</label>
        <label class="dchk"><input type="checkbox" id="f-aw2"> APBA Member</label>
        <label class="dchk"><input type="checkbox" id="f-am"> Medical Cert</label>
        <label class="dchk"><input type="checkbox" id="f-ad"> Dunker Test</label>
      </div>

      <div class="msec">Crew Members</div>
      <div class="crew-area">
        <div id="crew-rows"></div>
        <button class="btn-addcrew" onclick="addCrewRow()">+ Add crew member</button>
      </div>

      <div class="msec">Race Registration &amp; Entry Fee</div>
      <div class="race-reg-grid" id="rrg"></div>
    </div>
    <div class="modal-ftr">
      <div class="modal-ftr-l" id="meid"></div>
      <div class="modal-ftr-r">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveTeam()">Save Team</button>
      </div>
    </div>
  </div>
</div>

<div class="print-overlay" id="print-overlay">
  <div class="print-box">
    <div class="print-bar">
      <button class="btn-pclose" onclick="closePrint()">Close</button>
      <button class="btn-pprint" onclick="window.print()">&#128438; Print</button>
    </div>
    <div class="pc" id="print-content"></div>
  </div>
</div>

<div class="toast" id="toast"><div class="tdot" id="tdot"></div><span id="tmsg"></span></div>

<script>
const GH_OWNER='dylanfostercoxgp';
const GH_REPO='rwo-registration';
const GH_TOKEN='PASTE_NEW_TOKEN_HERE';
const APP_PW='rwo2026';
const DB_FILE='data.json';
const CLASSES=['Super Cat','Super Stock','Class 1','Factory Stock','Super Vee','Modified V','Bracket Class 2','Bracket Class 3','Bracket Class 4','Bracket Class 5','Bracket Class 6','Bracket Class 7','Cat 300','Extreme'];
const DEFAULT_RACES=[{id:'clearwater',name:'Clearwater',date:'Sep 26-28, 2026'},{id:'miami',name:'Miami',date:'Nov 7-9, 2026'},{id:'bimini',name:'Bimini',date:'Jan 15-17, 2027'},{id:'nassau',name:'Nassau',date:'Mar 4-6, 2027'}];
let DB={teams:[],races:[],season:'2026'};
let editId=null,curRace='all',saveTimer=null,crewCt=0;

function checkPw(){
  const v=document.getElementById('pw-input').value;
  if(v===APP_PW){
    sessionStorage.setItem('rwo_auth','1');
    document.getElementById('pw-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }else{
    const e=document.getElementById('pw-err');e.style.display='block';
    setTimeout(()=>{e.style.display='none';},2500);
    document.getElementById('pw-input').value='';
  }
}
function doLogout(){sessionStorage.removeItem('rwo_auth');location.reload();}
function toggleTheme(){
  const t=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=t;
  localStorage.setItem('rwo_theme',t);
  document.getElementById('theme-icon').innerHTML=t==='dark'?'&#127769;':'&#9728;';
}
async function ghGet(p){
  const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${p}`,{headers:{Authorization:`token ${GH_TOKEN}`,Accept:'application/vnd.github.v3+json'}});
  if(r.status===404)return null;if(!r.ok)throw new Error('GET '+r.status);return r.json();
}
async function ghPut(p,content,sha){
  const enc=btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2))));
  const body={message:'RWO update',content:enc,...(sha&&{sha})};
  const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${p}`,{method:'PUT',headers:{Authorization:`token ${GH_TOKEN}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error('PUT '+r.status);return r.json();
}
async function loadData(){
  setSave('saving');
  try{
    const f=await ghGet(DB_FILE);
    if(f){DB=JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,'')))));DB._sha=f.sha;}
    else{DB={teams:[],races:DEFAULT_RACES,season:'2026'};await saveData();}
    if(!DB.races||!DB.races.length)DB.races=DEFAULT_RACES;
    setSave('saved');
  }catch(e){setSave('error');toast('Load error: '+e.message,'r');}
}
async function saveData(){
  setSave('saving');
  try{
    const sha=DB._sha;const copy=JSON.parse(JSON.stringify(DB));delete copy._sha;
    const res=await ghPut(DB_FILE,copy,sha);DB._sha=res.content.sha;setSave('saved');
  }catch(e){setSave('error');toast('Save failed: '+e.message,'r');}
}
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,1500);}
function setSave(s){
  const d=document.getElementById('sdot'),l=document.getElementById('slbl');
  d.className='sdot'+(s==='saving'?' saving':s==='error'?' error':'');
  l.textContent=s==='saving'?'Saving...':s==='error'?'Error':'Saved';
}
async function initApp(){await loadData();buildNav();renderAll();}
function buildNav(){
  const nav=document.getElementById('race-nav');
  nav.innerHTML='<button class="race-tab active" data-race="all" onclick="switchRace(this)">All Races</button>';
  (DB.races||[]).forEach(r=>{const b=document.createElement('button');b.className='race-tab';b.dataset.race=r.id;b.onclick=function(){switchRace(this);};b.textContent=r.name;nav.appendChild(b);});
  document.getElementById('season-tag').textContent=(DB.season||'2026')+' Season';
}
function switchRace(el){document.querySelectorAll('.race-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');curRace=el.dataset.race;renderAll();}
function getByRace(){if(!DB.teams)return[];if(curRace==='all')return DB.teams;return DB.teams.filter(t=>t.races&&t.races[curRace]&&t.races[curRace].registered);}
function missingDocs(t){return['driver','throttle'].some(r=>!t[r+'_rwo']||!t[r+'_apbamem']||!t[r+'_medical']||!t[r+'_dunker']);}
function payBadge(t){
  const races=curRace==='all'?(DB.races||[]).map(r=>r.id):[curRace];
  const reg=races.filter(rid=>t.races&&t.races[rid]&&t.races[rid].registered);
  if(!reg.length)return'<span class="pill p-gray">Not registered</span>';
  const ss=reg.map(rid=>t.races[rid].payment||'unpaid');
  if(ss.every(s=>s==='paid'))return'<span class="pill p-green">&#10003; Paid</span>';
  if(ss.every(s=>s==='unpaid'))return'<span class="pill p-red">Unpaid</span>';
  return'<span class="pill p-amber">Partial</span>';
}
function racesBadge(t){
  const reg=(DB.races||[]).filter(r=>t.races&&t.races[r.id]&&t.races[r.id].registered);
  if(!reg.length)return'<span class="pill p-gray">No races</span>';
  if(reg.length===(DB.races||[]).length)return`<span class="pill p-ac">All ${reg.length} races</span>`;
  return`<span class="pill p-ac">${reg.map(r=>r.name).join(', ')}</span>`;
}
function roleHTML(t,role,lbl){
  const nm=t[role+'_name'];if(!nm)return'';
  const keys=[['rwo','RWO Member'],['apbamem','APBA Member'],['medical','Medical Cert'],['dunker','Dunker Test']];
  return`<div class="role-col"><div class="role-heading">${lbl}</div><div class="person-name-t">${nm}</div><div class="apba-num">${t[role+'_apba']?'APBA #'+t[role+'_apba']:'&mdash;'}</div><div class="checklist">${keys.map(([k,l])=>`<div class="check-item"><div class="cdot ${t[role+'_'+k]?'ok':'no'}"></div>${l}</div>`).join('')}</div></div>`;
}
function crewHTML(t){
  const crew=t.crew||[];if(!crew.length)return'';
  return`<div class="crew-section"><div class="crew-section-label">Crew Members</div>${crew.map(c=>`<div class="crew-item"><div class="crew-cdot ${c.paid==='paid'?'ok':'no'}"></div>${c.name||'&mdash;'} <span style="font-size:10px;color:var(--text3)">(${c.paid==='paid'?'Paid':'Unpaid'})</span></div>`).join('')}</div>`;
}
function cardHTML(t){
  const upd=t.updated?new Date(t.updated).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'N/A';
  return`<div class="team-card" id="card-${t.id}"><div class="card-head"><div class="card-head-l"><div class="boat-badge">${t.boatnum||'?'}</div><div><div class="team-name-t">${t.teamname||'Unnamed'}</div><div class="team-meta">${[t.class,t.notes].filter(Boolean).join(' &mdash; ')}</div></div></div><div class="card-head-r">${racesBadge(t)} ${payBadge(t)}</div></div><div class="card-body-inner">${roleHTML(t,'driver','Driver')}${roleHTML(t,'throttle','Throttleman')}${t.alt_name?roleHTML(t,'alt','Alternate'):''}</div>${crewHTML(t)}<div class="card-foot"><div class="card-foot-note">Updated ${upd}</div><div class="card-actions"><button class="btn-sm btn-sm-ol" onclick="doPrint('${t.id}')">&#128438; Print</button><button class="btn-sm btn-sm-ol" onclick="openEdit('${t.id}')">Edit</button><button class="btn-sm btn-sm-r" onclick="delTeam('${t.id}')">Delete</button></div></div></div>`;
}
function renderAll(){renderStats();renderTeams();}
function renderStats(){
  const teams=getByRace();let paid=0,unpaid=0,docs=0;
  teams.forEach(t=>{
    const races=curRace==='all'?(DB.races||[]).map(r=>r.id):[curRace];
    const reg=races.filter(rid=>t.races&&t.races[rid]&&t.races[rid].registered);
    if(!reg.length)return;
    if(reg.every(rid=>t.races[rid].payment==='paid'))paid++;
    else if(reg.some(rid=>!t.races[rid].payment||t.races[rid].payment==='unpaid'))unpaid++;
    if(missingDocs(t))docs++;
  });
  document.getElementById('stats-row').innerHTML=`<div class="stat"><div class="stat-lbl">Teams</div><div class="stat-num">${teams.length}</div></div><div class="stat"><div class="stat-lbl">Fully Paid</div><div class="stat-num g">${paid}</div></div><div class="stat"><div class="stat-lbl">Unpaid / Partial</div><div class="stat-num r">${unpaid}</div></div><div class="stat"><div class="stat-lbl">Missing Docs</div><div class="stat-num a">${docs}</div></div>`;
}
function renderTeams(){
  const c=document.getElementById('teams-container');
  const q=document.getElementById('search-in').value.toLowerCase();
  const fp=document.getElementById('fpay').value;
  const fd=document.getElementById('fdocs').value;
  let teams=getByRace();
  if(q)teams=teams.filter(t=>(t.teamname||'').toLowerCase().includes(q)||(t.boatnum||'').toLowerCase().includes(q)||(t.driver_name||'').toLowerCase().includes(q)||(t.throttle_name||'').toLowerCase().includes(q));
  if(fp)teams=teams.filter(t=>{
    const races=curRace==='all'?(DB.races||[]).map(r=>r.id):[curRace];
    const reg=races.filter(rid=>t.races&&t.races[rid]&&t.races[rid].registered);if(!reg.length)return false;
    if(fp==='paid')return reg.every(rid=>t.races[rid].payment==='paid');
    if(fp==='unpaid')return reg.some(rid=>!t.races[rid].payment||t.races[rid].payment==='unpaid');
    if(fp==='partial')return reg.some(rid=>t.races[rid].payment==='partial');
  });
  if(fd==='missing')teams=teams.filter(t=>missingDocs(t));
  if(fd==='complete')teams=teams.filter(t=>!missingDocs(t));
  if(!teams.length){c.innerHTML=`<div class="empty-state"><div style="font-size:40px;opacity:.2;margin-bottom:1rem">&#9875;</div><h3>No teams found</h3><p style="margin-top:4px;font-size:13px;color:var(--text3)">Add your first team above.</p></div>`;return;}
  const grouped={};
  teams.forEach(t=>{const cl=t.class||'Unclassified';if(!grouped[cl])grouped[cl]=[];grouped[cl].push(t);});
  Object.keys(grouped).forEach(cl=>{grouped[cl].sort((a,b)=>{const na=parseInt(a.boatnum)||9999,nb=parseInt(b.boatnum)||9999;return na-nb||(a.boatnum||'').localeCompare(b.boatnum||'');});});
  const ordered=[...CLASSES.filter(cl=>grouped[cl]),...Object.keys(grouped).filter(cl=>!CLASSES.includes(cl))];
  c.innerHTML=ordered.map(cl=>`<div class="class-group"><div class="class-group-hdr"><div class="class-group-name">${cl}</div><div class="class-group-ct">${grouped[cl].length} team${grouped[cl].length!==1?'s':''}</div></div><div class="team-grid">${grouped[cl].map(cardHTML).join('')}</div></div>`).join('');
}
function buildRRG(t){
  document.getElementById('rrg').innerHTML=(DB.races||[]).map(r=>{
    const rd=(t&&t.races&&t.races[r.id])||{};
    return`<div class="rri"><div class="rri-head"><div class="rri-name">${r.name}</div><div class="rri-date">${r.date}</div></div><div class="rri-body"><label class="rri-chk"><input type="checkbox" id="rr-${r.id}" ${rd.registered?'checked':''}> Registered</label><div class="pay-lbl">Entry Fee</div><select class="pay-sel" id="rp-${r.id}"><option value="unpaid" ${(!rd.payment||rd.payment==='unpaid')?'selected':''}>Unpaid</option><option value="paid" ${rd.payment==='paid'?'selected':''}>Paid</option><option value="partial" ${rd.payment==='partial'?'selected':''}>Partial</option></select></div></div>`;
  }).join('');
}
function buildCrewRows(crew){crewCt=0;document.getElementById('crew-rows').innerHTML='';(crew||[]).forEach(c=>addCrewRow(c.name,c.paid));}
function addCrewRow(name,paid){
  const id=crewCt++;const row=document.createElement('div');row.className='crew-row';row.id='cr-'+id;
  row.innerHTML=`<input type="text" placeholder="Crew member name" value="${name||''}"><select class="crew-paysel"><option value="unpaid" ${(!paid||paid==='unpaid')?'selected':''}>Unpaid</option><option value="paid" ${paid==='paid'?'selected':''}>Paid</option></select><button class="btn-rm" onclick="document.getElementById('cr-${id}').remove()">&times;</button>`;
  document.getElementById('crew-rows').appendChild(row);
}
function getCrewFromForm(){
  const crew=[];
  document.querySelectorAll('#crew-rows .crew-row').forEach(row=>{const nm=row.querySelector('input[type="text"]').value.trim();const pd=row.querySelector('select').value;if(nm)crew.push({name:nm,paid:pd});});
  return crew;
}
function clearForm(){
  ['f-tn','f-bn','f-cl','f-nt','f-dn','f-dw','f-tn2','f-tw','f-an','f-aw'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['f-dr','f-dw2','f-dm','f-dd','f-tr','f-tw2','f-tm','f-td','f-ar','f-aw2','f-am','f-ad'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=false;});
  ['f-drwop','f-dapbap','f-trwop','f-tapbap'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='unpaid';});
  document.getElementById('crew-rows').innerHTML='';crewCt=0;
}
function openAdd(){editId=null;document.getElementById('mtitle').textContent='Add Team';document.getElementById('meid').textContent='';clearForm();buildRRG(null);document.getElementById('team-modal').classList.add('open');}
function openEdit(id){
  const t=DB.teams.find(x=>x.id===id);if(!t)return;editId=id;
  document.getElementById('mtitle').textContent='Edit Team';document.getElementById('meid').textContent='ID: '+id;
  document.getElementById('f-tn').value=t.teamname||'';document.getElementById('f-bn').value=t.boatnum||'';
  document.getElementById('f-cl').value=t.class||'';document.getElementById('f-nt').value=t.notes||'';
  document.getElementById('f-dn').value=t.driver_name||'';document.getElementById('f-dw').value=t.driver_apba||'';
  document.getElementById('f-dr').checked=!!t.driver_rwo;document.getElementById('f-dw2').checked=!!t.driver_apbamem;
  document.getElementById('f-dm').checked=!!t.driver_medical;document.getElementById('f-dd').checked=!!t.driver_dunker;
  document.getElementById('f-drwop').value=t.driver_rwo_pay||'unpaid';document.getElementById('f-dapbap').value=t.driver_apba_pay||'unpaid';
  document.getElementById('f-tn2').value=t.throttle_name||'';document.getElementById('f-tw').value=t.throttle_apba||'';
  document.getElementById('f-tr').checked=!!t.throttle_rwo;document.getElementById('f-tw2').checked=!!t.throttle_apbamem;
  document.getElementById('f-tm').checked=!!t.throttle_medical;document.getElementById('f-td').checked=!!t.throttle_dunker;
  document.getElementById('f-trwop').value=t.throttle_rwo_pay||'unpaid';document.getElementById('f-tapbap').value=t.throttle_apba_pay||'unpaid';
  document.getElementById('f-an').value=t.alt_name||'';document.getElementById('f-aw').value=t.alt_apba||'';
  document.getElementById('f-ar').checked=!!t.alt_rwo;document.getElementById('f-aw2').checked=!!t.alt_apbamem;
  document.getElementById('f-am').checked=!!t.alt_medical;document.getElementById('f-ad').checked=!!t.alt_dunker;
  buildCrewRows(t.crew);buildRRG(t);document.getElementById('team-modal').classList.add('open');
}
function closeModal(){document.getElementById('team-modal').classList.remove('open');}
function saveTeam(){
  const tn=document.getElementById('f-tn').value.trim();if(!tn){toast('Team name is required','r');return;}
  const races={};(DB.races||[]).forEach(r=>{races[r.id]={registered:document.getElementById('rr-'+r.id).checked,payment:document.getElementById('rp-'+r.id).value};});
  const d={
    teamname:tn,boatnum:document.getElementById('f-bn').value.trim(),class:document.getElementById('f-cl').value,notes:document.getElementById('f-nt').value.trim(),
    driver_name:document.getElementById('f-dn').value.trim(),driver_apba:document.getElementById('f-dw').value.trim(),
    driver_rwo:document.getElementById('f-dr').checked,driver_apbamem:document.getElementById('f-dw2').checked,
    driver_medical:document.getElementById('f-dm').checked,driver_dunker:document.getElementById('f-dd').checked,
    driver_rwo_pay:document.getElementById('f-drwop').value,driver_apba_pay:document.getElementById('f-dapbap').value,
    throttle_name:document.getElementById('f-tn2').value.trim(),throttle_apba:document.getElementById('f-tw').value.trim(),
    throttle_rwo:document.getElementById('f-tr').checked,throttle_apbamem:document.getElementById('f-tw2').checked,
    throttle_medical:document.getElementById('f-tm').checked,throttle_dunker:document.getElementById('f-td').checked,
    throttle_rwo_pay:document.getElementById('f-trwop').value,throttle_apba_pay:document.getElementById('f-tapbap').value,
    alt_name:document.getElementById('f-an').value.trim(),alt_apba:document.getElementById('f-aw').value.trim(),
    alt_rwo:document.getElementById('f-ar').checked,alt_apbamem:document.getElementById('f-aw2').checked,
    alt_medical:document.getElementById('f-am').checked,alt_dunker:document.getElementById('f-ad').checked,
    crew:getCrewFromForm(),races,updated:new Date().toISOString()
  };
  if(editId){const i=DB.teams.findIndex(x=>x.id===editId);if(i>=0){d.id=editId;DB.teams[i]=d;}}
  else{d.id='team_'+Date.now();DB.teams.push(d);}
  closeModal();renderAll();toast(editId?'Team updated':'Team added','g');queueSave();
}
function delTeam(id){if(!confirm('Delete this team?'))return;DB.teams=DB.teams.filter(t=>t.id!==id);renderAll();toast('Team deleted','r');queueSave();}
function doPrint(id){
  const t=DB.teams.find(x=>x.id===id);if(!t)return;
  const race=curRace!=='all'?(DB.races||[]).find(r=>r.id===curRace):null;
  const evtLbl=race?race.name+' &mdash; '+race.date:'All Events &mdash; '+(DB.season||'2026')+' Season';
  function pdot(val){return val?'<div class="pc-dot ok"></div>':'<div class="pc-dot no"></div>';}
  const incomplete=[];
  [['driver',t.driver_name],['throttle',t.throttle_name]].forEach(([role,nm])=>{
    if(!nm)return;const lbl=role==='driver'?'Driver':'Throttleman';
    if(!t[role+'_rwo'])incomplete.push(lbl+' &mdash; RWO Member');
    if(!t[role+'_apbamem'])incomplete.push(lbl+' &mdash; APBA Member');
    if(!t[role+'_medical'])incomplete.push(lbl+' &mdash; Medical Cert');
    if(!t[role+'_dunker'])incomplete.push(lbl+' &mdash; Dunker Test');
    if((t[role+'_rwo_pay']||'unpaid')==='unpaid')incomplete.push(lbl+' &mdash; RWO Fee');
    if((t[role+'_apba_pay']||'unpaid')==='unpaid')incomplete.push(lbl+' &mdash; APBA Fee');
  });
  (DB.races||[]).forEach(r=>{if(t.races&&t.races[r.id]&&t.races[r.id].registered&&t.races[r.id].payment!=='paid')incomplete.push(r.name+' &mdash; Entry Fee');});
  (t.crew||[]).forEach(c=>{if(c.paid!=='paid')incomplete.push('Crew: '+c.name);});
  function pcRole(role,lbl){
    const nm=t[role+'_name'];if(!nm)return'';
    const keys=[['rwo','RWO Member'],['apbamem','APBA Member'],['medical','Medical Cert'],['dunker','Dunker Test']];
    return`<div class="pc-role"><div class="pc-rlbl">${lbl}</div><div class="pc-rname">${nm}</div><div class="pc-rapba">${t[role+'_apba']?'APBA #'+t[role+'_apba']:'&nbsp;'}</div><div class="pc-checks">${keys.map(([k,l])=>`<div class="pc-chk">${pdot(t[role+'_'+k])} ${l}</div>`).join('')}</div></div>`;
  }
  function payStatus(rid){
    if(!t.races||!t.races[rid]||!t.races[rid].registered)return'<span class="pc-pay-status na">N/A</span>';
    const p=t.races[rid].payment||'unpaid';
    return`<span class="pc-pay-status ${p}">${p.charAt(0).toUpperCase()+p.slice(1)}</span>`;
  }
  const crewSec=(t.crew&&t.crew.length)?`<div class="pc-crew-list"><div class="pc-crew-hdr">Crew Members</div>${t.crew.map(c=>`<div class="pc-crew-row"><span class="pc-crew-name">${c.name}</span><span class="pc-crew-pay ${c.paid}">${c.paid==='paid'?'Paid':'Unpaid'}</span></div>`).join('')}</div>`:'';
  const verifySec=incomplete.length?`<div class="pc-verify"><div class="pc-verify-title">&#9998; Onsite Verification &mdash; Items Needed</div><div class="pc-verify-grid">${incomplete.map(item=>`<div class="pc-verify-item"><div class="pc-verify-box"></div>${item}</div>`).join('')}</div></div>`:'<div style="background:#f0fbf5;border:1px solid #c0e8d4;border-radius:7px;padding:8px 11px;font-size:11px;color:#2d8c5e;font-weight:600;">&#10003; All requirements complete</div>';
  document.getElementById('print-content').innerHTML=`
    <div class="pc-hdr"><div><div class="pc-org">Race World Offshore</div><div class="pc-evtlbl">${evtLbl}</div></div><div class="pc-boat">${t.boatnum||'?'}</div></div>
    <div class="pc-team-row"><div class="pc-tname">${t.teamname}</div>${t.class?`<div class="pc-cls">${t.class}</div>`:''}</div>
    <div class="pc-mempaid">
      <div class="pc-mp-cell"><div class="pc-mp-lbl">Driver RWO Fee</div><div class="pc-mp-val ${t.driver_rwo_pay||'unpaid'}">${(t.driver_rwo_pay||'unpaid')==='paid'?'Paid':'Unpaid'}</div></div>
      <div class="pc-mp-cell"><div class="pc-mp-lbl">Driver APBA Fee</div><div class="pc-mp-val ${t.driver_apba_pay||'unpaid'}">${(t.driver_apba_pay||'unpaid')==='paid'?'Paid':'Unpaid'}</div></div>
      <div class="pc-mp-cell"><div class="pc-mp-lbl">Throttle RWO Fee</div><div class="pc-mp-val ${t.throttle_rwo_pay||'unpaid'}">${(t.throttle_rwo_pay||'unpaid')==='paid'?'Paid':'Unpaid'}</div></div>
      <div class="pc-mp-cell"><div class="pc-mp-lbl">Throttle APBA Fee</div><div class="pc-mp-val ${t.throttle_apba_pay||'unpaid'}">${(t.throttle_apba_pay||'unpaid')==='paid'?'Paid':'Unpaid'}</div></div>
    </div>
    <div class="pc-crew-grid">${pcRole('driver','Driver')}${pcRole('throttle','Throttleman')}${t.alt_name?pcRole('alt','Alternate'):''}</div>
    ${crewSec}
    <div class="pc-pay"><div class="pc-pay-hdr">Entry Fee &mdash; Payment Status Per Race</div><div class="pc-pay-grid">${(DB.races||[]).map(r=>`<div class="pc-pay-cell"><div class="pc-pay-race">${r.name}</div>${payStatus(r.id)}</div>`).join('')}</div></div>
    ${verifySec}
    <div class="pc-ftr"><div class="pc-ftr-note">Printed ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div><div class="pc-ftr-logo">RWO</div></div>`;
  document.getElementById('print-overlay').classList.add('open');
}
function closePrint(){document.getElementById('print-overlay').classList.remove('open');}
let toastTmr;
function toast(msg,color){
  document.getElementById('tmsg').textContent=msg;
  document.getElementById('tdot').style.background=color==='r'?'var(--red)':color==='a'?'var(--amber)':'var(--green)';
  const el=document.getElementById('toast');el.classList.add('show');clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>el.classList.remove('show'),3000);
}
window.addEventListener('DOMContentLoaded',()=>{
  const th=localStorage.getItem('rwo_theme')||'dark';
  document.documentElement.dataset.theme=th;
  document.getElementById('theme-icon').innerHTML=th==='dark'?'&#127769;':'&#9728;';
  if(sessionStorage.getItem('rwo_auth')==='1'){
    document.getElementById('pw-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  }
});
</script>
